# East-west allow rules for Online Boutique v0.10.5 (label app: <service>).
# Graph derived from *_SERVICE_ADDR / REDIS_ADDR in base/manifests.yaml.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-productcatalogservice
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
    app.kubernetes.io/component: network-policy
    app: productcatalogservice
spec:
  podSelector:
    matchLabels:
      app: productcatalogservice
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - podSelector:
            matchLabels:
              app: checkoutservice
        - podSelector:
            matchLabels:
              app: recommendationservice
      ports:
        - protocol: TCP
          port: 3550
---
