# Prod overlay — namespace boutique-prod, manual Argo sync, ADO approval before Git digest update.
# SETUP: replace <ACR_LOGIN_SERVER> (must match base/kustomization.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: boutique-prod

resources:
  - namespace.yaml
  - ingress.yaml
  - ../../base

patches:
  - path: patches/recreate-deployment-strategy.yaml
  - path: patches/reduce-resource-requests.yaml
  - path: patches/container-run-as-non-root.yaml
  - path: patches/replicas-patch.yaml

# Digest pins — must match validated stage digest (immutable promotion).
# images:
#   - name: <ACR_LOGIN_SERVER>/frontend
#     digest: sha256:...
