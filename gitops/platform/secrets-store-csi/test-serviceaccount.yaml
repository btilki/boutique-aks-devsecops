# Test ServiceAccount — uses platform UAMI for Key Vault access.
# SETUP: replace <PLATFORM_IDENTITY_CLIENT_ID>
# Prerequisite: federated credential for system:serviceaccount:csi-test:csi-test-sa (Step 7.3)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: csi-test-sa
  namespace: csi-test
  annotations:
    argocd.argoproj.io/sync-wave: "31"
    azure.workload.identity/client-id: <PLATFORM_IDENTITY_CLIENT_ID>
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
    azure.workload.identity/use: "true"
