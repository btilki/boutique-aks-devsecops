# SecretProviderClass — mount Key Vault secret via Workload Identity.
# SETUP: replace <KEY_VAULT_NAME>, <TENANT_ID>, <PLATFORM_IDENTITY_CLIENT_ID>
# Prerequisite: secret `csi-test-secret` exists in Key Vault (Step 7.2).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-test
  namespace: csi-test
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: 7d372e00-f8ab-4f0d-9f1d-d3e4d9e24684
    keyvaultName: kv-boutique-dev-gwc
    tenantId: 4372a5ba-93fa-42a4-a9ce-241da29fc6f4
    objects: |
      array:
        - |
          objectName: csi-test-secret
          objectType: secret
  secretObjects:
    - secretName: csi-test-kv-secret
      type: Opaque
      data:
        - objectName: csi-test-secret
          key: value
