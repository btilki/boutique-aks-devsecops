# SecretProviderClass — mount Key Vault secret via Workload Identity.
# SETUP: replace <KEY_VAULT_NAME>, <TENANT_ID>, <PLATFORM_IDENTITY_CLIENT_ID>
# Prerequisite: secret `csi-test-secret` exists in Key Vault (Step 7.2).
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-test
  namespace: csi-test
  annotations:
    argocd.argoproj.io/sync-wave: "30"
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: <PLATFORM_IDENTITY_CLIENT_ID>
    keyvaultName: <KEY_VAULT_NAME>
    tenantId: <TENANT_ID>
    objects: |
      array:
        - |
          objectName: csi-test-secret
          objectType: secret
  secretObjects:
    - secretName: csi-test-kv-secret
      type: Opaque
      data:
        - objectName: csi-test-secret
          key: value
