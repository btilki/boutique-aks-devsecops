# Platform GitOps — platform-root syncs Application CRs only (app-of-apps).
# Child Applications deploy Helm/manifests to their own namespaces.
# Topic 06: ingress-nginx, cert-manager, argocd-ingress
# Topics 07–08, 11, 18: CSI, Kyverno, monitoring, Falco Applications below
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ingress-nginx/Application.yaml
  - cert-manager/crds-application.yaml
  - cert-manager/Application.yaml
  - cert-manager/issuer-application.yaml
  - argocd-ingress.yaml
  - secrets-store-csi/Application.yaml
  - secrets-store-csi/namespace-csi-test.yaml
  - secrets-store-csi/secretproviderclass-example.yaml
  - secrets-store-csi/test-serviceaccount.yaml
  - secrets-store-csi/test-pod.yaml
  - kyverno/
  - falco/Application.yaml
  - monitoring/
