# OpenTelemetry Collector configuration — baseline trace receiver (10% sampling).
# Reference copy; live config is inlined in otel/values.yaml for Helm deployment.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}
  probabilistic_sampler:
    sampling_percentage: 10

exporters:
  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [probabilistic_sampler, batch]
      exporters: [debug]
