# Argo CD Application — OpenTelemetry Collector (baseline traces).
# SETUP: replace <GITHUB_ORG>/<REPO_NAME> in the values source repoURL.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-collector
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "41"
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-collector
      targetRevision: 0.95.0
      helm:
        releaseName: otel-collector
        valueFiles:
          - $values/gitops/platform/monitoring/otel/values.yaml
    - repoURL: https://github.com/<GITHUB_ORG>/<REPO_NAME>
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
