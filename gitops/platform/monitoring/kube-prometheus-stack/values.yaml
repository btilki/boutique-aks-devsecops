# kube-prometheus-stack Helm values — chart 58.2.2 per versions.yaml
# Grafana: grafana-boutique.biroltilki.art (TLS via cert-manager)
# SETUP: create Secret grafana-admin-credentials before sync (see docs/setup/11-observability.md)

fullnameOverride: kube-prometheus-stack

defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false
    kubeScheduler: false
    kubeControllerManager: false

alertmanager:
  enabled: true
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

grafana:
  enabled: true
  admin:
    existingSecret: grafana-admin-credentials
    userKey: admin-user
    passwordKey: admin-password
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      url: http://loki.monitoring.svc.cluster.local:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - grafana-boutique.biroltilki.art
    tls:
      - secretName: grafana-tls
        hosts:
          - grafana-boutique.biroltilki.art
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: 10GB
    scrapeInterval: 30s
    evaluationInterval: 30s
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 2Gi

prometheusOperator:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# Lab sizing — disable components not needed on AKS
kubeEtcd:
  enabled: false
kubeControllerManager:
  enabled: false
kubeScheduler:
  enabled: false
