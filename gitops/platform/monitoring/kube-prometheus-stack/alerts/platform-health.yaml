# Platform health alerts — node readiness, Kyverno, certificate expiry.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-health
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "45"
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: boutique-aks-devsecops
spec:
  groups:
    - name: platform.health
      interval: 30s
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 10m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: Kubernetes node not ready
            description: Node {{ $labels.node }} has been NotReady for more than 10 minutes.
        - alert: KyvernoAdmissionDown
          expr: |
            kube_deployment_status_replicas_available{
              namespace="kyverno",
              deployment="kyverno-admission-controller"
            } < 1
          for: 5m
          labels:
            severity: critical
            team: platform
          annotations:
            summary: Kyverno admission controller unavailable
            description: kyverno-admission-controller has no available replicas.
        - alert: IngressCertExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) < 14 * 24 * 3600
            and certmanager_certificate_expiration_timestamp_seconds > 0
          for: 1h
          labels:
            severity: warning
            team: platform
          annotations:
            summary: TLS certificate expiring within 14 days
            description: Certificate {{ $labels.name }} in {{ $labels.namespace }} expires soon.
