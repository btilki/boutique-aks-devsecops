# Argo CD Application — kube-prometheus-stack (Prometheus, Grafana, Alertmanager).
# SETUP: replace <GITHUB_ORG>/<REPO_NAME> in the values source repoURL.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
  labels:
    app.kubernetes.io/part-of: boutique-aks-devsecops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: monitoring
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 58.2.2
      helm:
        releaseName: kube-prometheus-stack
        valueFiles:
          - $values/gitops/platform/monitoring/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/btilki/boutique-aks-devsecops
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      # Large Prometheus CRDs exceed last-applied-configuration annotation limit
      - ServerSideApply=true
