# Scrape Boutique frontend Service (metrics path may be empty until app exposes /metrics).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: boutique-frontend
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "45"
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: boutique-aks-devsecops
spec:
  namespaceSelector:
    matchNames:
      - boutique-dev
  selector:
    matchLabels:
      app: frontend
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
