# Scrape NGINX Ingress Controller metrics (requires metrics.enabled in ingress-nginx values).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ingress-nginx
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "45"
  labels:
    release: kube-prometheus-stack
    app.kubernetes.io/part-of: boutique-aks-devsecops
spec:
  namespaceSelector:
    matchNames:
      - ingress-nginx
  selector:
    matchLabels:
      app.kubernetes.io/name: ingress-nginx
      app.kubernetes.io/component: controller
  endpoints:
    - port: metrics
      interval: 30s
