# cert-manager Helm values — chart v1.14.5 per versions.yaml
# SETUP: set azure.workload.identity/client-id to terraform output platform_identity_client_id
crds:
  enabled: true

replicaCount: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 256Mi

serviceAccount:
  labels:
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: "7d372e00-f8ab-4f0d-9f1d-d3e4d9e24684"

podLabels:
  azure.workload.identity/use: "true"

webhook:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

cainjector:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

startupapicheck:
  enabled: true
