# Local validation hooks — run: pre-commit install && pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: |
          (?x)^(
            gitops/bootstrap/argocd-install/charts/|
            gitops/apps/boutique/base/manifests\.yaml
          )
      - id: check-added-large-files
        args: [--maxkb=512]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.1
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        # Validate composed roots only — leaf modules inherit provider pins from environments.
        files: ^terraform/(bootstrap|environments)/

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [-c, .yamllint.yml]
        files: ^(gitops|policies|pipelines)/

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
