# Allow only images from the platform ACR.
# SETUP: replace acrboutiquedevgwc with terraform output acr_name (no .azurecr.io suffix).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: registry-allowlist
  annotations:
    policies.kyverno.io/title: ACR Registry Allowlist
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: acr-allowlist
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
                - ingress-nginx
                - cert-manager
                - csi-test
                - monitoring
      validate:
        message: "Only images from acrboutiquedevgwc.azurecr.io are allowed."
        pattern:
          spec:
            =(ephemeralContainers):
              - image: "acrboutiquedevgwc.azurecr.io/*"
            =(initContainers):
              - image: "acrboutiquedevgwc.azurecr.io/*"
            containers:
              - image: "acrboutiquedevgwc.azurecr.io/*"
